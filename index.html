<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#E85D4A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Familien-Kochbuch</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <link rel="stylesheet" href="style.css" />
    
    <meta property="og:image" content="https://bolt.new/static/og_default.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://bolt.new/static/og_default.png">
  </head>
  <body>

    <header class="app-header">
      <div class="header-inner">
        <div class="header-brand">
          <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 11l19-9-9 19-2-8-8-2z"/>
          </svg>
          <h1 class="brand-title">Kochbuch</h1>
        </div>
        <button class="cart-btn" id="cartBtn" aria-label="Einkaufsliste öffnen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 01-8 0"/>
          </svg>
          <span class="cart-badge hidden" id="cartBadge">0</span>
        </button>
      </div>
    </header>

    <main class="app-main">

      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">Alle</button>
        <button class="filter-btn" data-filter="Phil">Phil</button>
        <button class="filter-btn" data-filter="Zusammen">Zusammen</button>
      </div>

      <div class="search-section">
        <div class="search-input-wrapper">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input
            type="search"
            id="searchInput"
            class="search-input"
            placeholder="Was habe ich im Kühlschrank?"
            autocomplete="off"
          />
          <button class="search-clear hidden" id="searchClear" aria-label="Suche löschen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="time-filter-tags">
          <button class="time-tag" id="timeFilter30" data-active="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
            &lt; 30 Min
          </button>
        </div>
      </div>

      <div class="results-info" id="resultsInfo"></div>

      <div class="recipes-grid" id="recipesGrid"></div>

      <div class="empty-state hidden" id="emptyState">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
        <p>Keine Rezepte gefunden</p>
        <span>Versuche eine andere Suche oder Filter</span>
      </div>

    </main>

    <button class="fab" id="fabBtn" aria-label="Neues Rezept hinzufügen">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>

    <div class="overlay hidden" id="recipeOverlay" role="dialog" aria-modal="true">
      <div class="overlay-backdrop" id="recipeBackdrop"></div>
      <div class="overlay-sheet recipe-sheet" id="recipeSheet">
        <div class="sheet-drag-handle"></div>
        <div class="sheet-scroll">

          <div class="recipe-hero" id="detailHero">
            <img id="detailImage" src="" alt="" loading="lazy" />
            <div class="recipe-hero-gradient"></div>
            <button class="sheet-close-btn" id="closeRecipe" aria-label="Schließen">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
            <div class="recipe-hero-meta">
              <span class="recipe-category-tag" id="detailCategory"></span>
              <h2 class="recipe-detail-title" id="detailTitle"></h2>
              <div class="recipe-hero-stats">
                <span class="hero-stat" id="detailDuration">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                  </svg>
                  <span id="detailDurationText"></span>
                </span>
              </div>
            </div>
          </div>

          <div class="section-card">
            <div class="portions-row">
              <div class="portions-label">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
                  <circle cx="9" cy="7" r="4"/>
                  <path d="M23 21v-2a4 4 0 00-3-3.87"/>
                  <path d="M16 3.13a4 4 0 010 7.75"/>
                </svg>
                <span>Portionen</span>
              </div>
              <div class="portions-stepper">
                <button class="stepper-btn" id="portionsMinus" aria-label="Weniger">−</button>
                <span class="portions-count" id="portionsCount">4</span>
                <button class="stepper-btn" id="portionsPlus" aria-label="Mehr">+</button>
              </div>
            </div>
          </div>

          <div class="section-card">
            <div class="section-header">
              <h3>Zutaten</h3>
              <button class="btn-add-to-cart" id="addToCartBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                  <line x1="3" y1="6" x2="21" y2="6"/>
                  <path d="M16 10a4 4 0 01-8 0"/>
                </svg>
                Zur Einkaufsliste
              </button>
            </div>
            <ul class="ingredients-list" id="detailIngredients"></ul>
          </div>

          <div class="section-card">
            <h3>Zubereitung</h3>
            <ol class="steps-list" id="detailSteps"></ol>
          </div>

          <div class="section-card pinboard-card">
            <h3>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
              </svg>
              Familien-Pinnwand
            </h3>
            <div class="notes-list" id="detailNotes"></div>
            <div class="note-input-row">
              <input type="text" id="noteInput" class="note-input" placeholder="Notiz hinzufügen…" />
              <button class="btn-add-note" id="addNoteBtn" aria-label="Notiz speichern">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                  <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
              </button>
            </div>
          </div>

          <div style="height: 2rem;"></div>
        </div>
      </div>
    </div>

    <div class="overlay hidden" id="shoppingOverlay" role="dialog" aria-modal="true">
      <div class="overlay-backdrop" id="shoppingBackdrop"></div>
      <div class="overlay-sheet shopping-sheet" id="shoppingSheet">
        <div class="sheet-drag-handle"></div>
        <div class="panel-header">
          <h2>Einkaufsliste</h2>
          <button class="sheet-close-btn-inline" id="closeShoppingBtn" aria-label="Schließen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="panel-scroll">
          <div class="shopping-empty hidden" id="shoppingEmpty">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002
