<!doctype html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Familien-Kochbuch</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="app-header">
        <div class="header-inner">
            <h1 class="brand-title">Kochbuch</h1>
            <div class="header-actions">
                <button class="icon-btn" id="openPlannerBtn">📅</button>
                <button class="cart-btn" id="cartBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><path d="M16 10a4 4 0 01-8 0"/></svg>
                    <span class="cart-badge hidden" id="cartBadge">0</span>
                </button>
            </div>
        </div>
    </header>

    <main class="app-main">
        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">Alle</button>
            <button class="filter-btn" data-filter="Phil">Phil</button>
            <button class="filter-btn" data-filter="Zusammen">Zusammen</button>
        </div>
        <div class="search-section">
            <input type="search" id="searchInput" class="search-input" placeholder="Was kochen wir?" />
            <button id="randomBtn" class="random-btn" style="width:100%; margin-top:10px; padding:12px; border-radius:12px; border:1px solid #ddd; background:white; font-weight:bold;">🎲 Was kochen wir heute?</button>
        </div>
        <div class="results-info" id="resultsInfo"></div>
        <div class="recipes-grid" id="recipesGrid"></div>
    </main>

    <button class="fab" id="fabBtn">+</button>

    <div class="overlay hidden" id="plannerOverlay">
        <div class="overlay-backdrop"></div>
        <div class="overlay-sheet">
            <div class="panel-header"><h2>Wochenplan</h2><button class="close-overlay">✕</button></div>
            <div id="plannerDisplay" style="padding:20px;"></div>
            <button id="clearPlannerBtn" style="margin:20px; width:calc(100% - 40px); padding:10px; border:none; border-radius:10px; background:#eee;">Plan leeren</button>
        </div>
    </div>

    <div class="overlay hidden" id="recipeOverlay">
        <div class="overlay-backdrop"></div>
        <div class="overlay-sheet">
            <div class="recipe-hero">
                <img id="detailImage" src="" />
                <button class="close-overlay">✕</button>
                <div class="action-box" style="position:absolute; top:15px; left:15px; display:flex; gap:10px;">
                    <button id="editBtn" style="background:white; border:none; border-radius:50%; width:40px; height:40px; font-size:18px;">✏️</button>
                    <button id="deleteBtn" style="background:#ff4444; border:none; border-radius:50%; width:40px; height:40px; color:white; font-size:18px;">🗑️</button>
                </div>
            </div>
            <div class="panel-scroll" style="padding:20px;">
                <h2 id="detailTitle"></h2>
                <div style="background:#f0f0f0; padding:15px; border-radius:12px; margin-bottom:20px;">
                    <strong>In die Woche planen:</strong>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <select id="daySelector" style="flex:1; padding:8px; border-radius:8px;"><option value="Mo">Mo</option><option value="Di">Di</option><option value="Mi">Mi</option><option value="Do">Do</option><option value="Fr">Fr</option><option value="Sa">Sa</option><option value="So">So</option></select>
                        <button id="addToPlannerBtn" style="background:#E85D4A; color:white; border:none; padding:8px 15px; border-radius:8px;">OK</button>
                    </div>
                </div>
                <h3>Zutaten</h3><ul id="detailIngredients" class="ingredients-list"></ul>
                <h3>Zubereitung</h3><ol id="detailSteps" class="steps-list"></ol>
            </div>
        </div>
    </div>

    <div class="overlay hidden" id="addRecipeOverlay">
        <div class="overlay-backdrop"></div>
        <div class="overlay-sheet">
            <div class="panel-header"><h2 id="addFormTitle">Neues Rezept</h2><button class="close-overlay">✕</button></div>
            <div class="panel-scroll" style="padding:20px;">
                <form id="addRecipeForm">
                    <input type="text" id="newTitle" placeholder="Titel" required style="width:100%; margin-bottom:10px; padding:10px; border-radius:8px; border:1px solid #ddd;" />
                    <select id="newCategory" style="width:100%; margin-bottom:10px; padding:10px; border-radius:8px; border:1px solid #ddd;"><option value="Phil">Phil</option><option value="Zusammen">Zusammen</option></select>
                    <input type="number" id="newDuration" placeholder="Dauer (Min)" style="width:100%; margin-bottom:10px; padding:10px; border-radius:8px; border:1px solid #ddd;" />
                    <input type="url" id="newImage" placeholder="Bild-URL" style="width:100%; margin-bottom:10px; padding:10px; border-radius:8px; border:1px solid #ddd;" />
                    <div id="ingredientBuilder"></div>
                    <button type="button" id="addIngredientBtn" style="margin-bottom:10px;">+ Zutat</button>
                    <div id="stepsBuilder"></div>
                    <button type="button" id="addStepBtn" style="margin-bottom:20px;">+ Schritt</button>
                    <button type="submit" style="width:100%; background:#E85D4A; color:white; padding:15px; border:none; border-radius:12px; font-weight:bold;">SPEICHERN</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
