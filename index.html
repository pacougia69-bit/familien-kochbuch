<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#E85D4A" />
    <title>Familien-Kochbuch</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
</head>
  <body>
    <header class="app-header">
      <div class="header-inner">
        <div class="header-brand">
          <h1 class="brand-title">Kochbuch</h1>
        </div>
        <div class="header-actions">
          <button class="icon-btn" id="openPlannerBtn" aria-label="Wochenplan">📅</button>
          <button class="cart-btn" id="cartBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><path d="M16 10a4 4 0 01-8 0"/></svg>
            <span class="cart-badge hidden" id="cartBadge">0</span>
          </button>
        </div>
      </div>
    </header>

    <main class="app-main">
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">Alle</button>
        <button class="filter-btn" data-filter="Phil">Phil</button>
        <button class="filter-btn" data-filter="Zusammen">Zusammen</button>
      </div>

      <div class="search-section">
        <input type="search" id="searchInput" class="search-input" placeholder="Was kochen wir?" />
        <button id="randomBtn" class="random-dice-btn">🎲 Was kochen wir heute?</button>
      </div>

      <div class="results-info" id="resultsInfo"></div>
      <div class="recipes-grid" id="recipesGrid"></div>
    </main>

    <button class="fab" id="fabBtn">+</button>

    <div class="overlay hidden" id="plannerOverlay">
      <div class="overlay-backdrop"></div>
      <div class="overlay-sheet">
        <div class="panel-header">
          <h2>Wochenplan</h2>
          <button class="close-overlay">✕</button>
        </div>
        <div class="panel-scroll" id="plannerDisplay">
          </div>
        <button id="clearPlannerBtn" class="btn-secondary">Plan leeren</button>
      </div>
    </div>

    <div class="overlay hidden" id="recipeOverlay">
      <div class="overlay-backdrop"></div>
      <div class="overlay-sheet">
        <div class="recipe-hero">
          <img id="detailImage" src="" />
          <button class="close-overlay">✕</button>
        </div>
        <div class="panel-scroll">
          <h2 id="detailTitle"></h2>
          
          <div class="planner-add-box">
            <select id="daySelector">
              <option value="">Tag wählen...</option>
              <option value="Mo">Montag</option><option value="Di">Dienstag</option>
              <option value="Mi">Mittwoch</option><option value="Do">Donnerstag</option>
              <option value="Fr">Freitag</option><option value="Sa">Samstag</option>
              <option value="So">Sonntag</option>
            </select>
            <button id="addToPlannerBtn">Einplanen</button>
          </div>

          <div class="portions-calc">
            <span>Portionen:</span>
            <button id="portionsMinus">−</button>
            <span id="portionsCount">4</span>
            <button id="portionsPlus">+</button>
          </div>
          <ul id="detailIngredients"></ul>
          <ol id="detailSteps"></ol>
        </div>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
  </body>
</html>
