<!doctype html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Familien-Kochbuch</title>
    <style>
        :root { --primary: #E85D4A; --bg: #f8f9fa; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); padding-bottom: 80px; }
        header { background: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); sticky; top:0; z-index:10; }
        .app-main { padding: 15px; max-width: 500px; margin: 0 auto; }
        .filter-bar { display: flex; gap: 8px; margin-bottom: 15px; }
        .filter-btn { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd; background: white; cursor: pointer; }
        .filter-btn.active { background: var(--primary); color: white; border: none; }
        .search-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .recipes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .recipe-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .recipe-card img { width: 100%; height: 100px; object-fit: cover; }
        .recipe-card h3 { margin: 8px; font-size: 0.9rem; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; display: flex; align-items: flex-end; }
        .hidden { display: none !important; }
        .sheet { background: white; width: 100%; border-radius: 20px 20px 0 0; padding: 20px; max-height: 85vh; overflow-y: auto; box-sizing: border-box; }
        .fab { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; border-radius: 30px; background: var(--primary); color: white; border: none; font-size: 30px; }
        .planner-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <header>
        <h2 style="margin:0; color:var(--primary);">Kochbuch</h2>
        <div>
            <button onclick="showPlanner()" style="font-size:24px; background:none; border:none;">📅</button>
        </div>
    </header>

    <main class="app-main">
        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">Alle</button>
            <button class="filter-btn" data-filter="Phil">Phil</button>
            <button class="filter-btn" data-filter="Zusammen">Zusammen</button>
        </div>
        <input type="search" id="searchInput" class="search-input" placeholder="Suchen..." />
        <button id="randomBtn" style="width:100%; margin-top:10px; padding:10px; border-radius:10px; border:1px solid #ddd; background:white;">🎲 Zufalls-Rezept</button>
        <div id="recipesGrid" class="recipes-grid"></div>
    </main>

    <button class="fab" id="fabBtn">+</button>

    <div id="plannerOverlay" class="overlay hidden">
        <div class="sheet">
            <div style="display:flex; justify-content:space-between;"><h2>Wochenplan</h2><button onclick="closeAll()" style="font-size:24px; border:none; background:none;">✕</button></div>
            <div id="plannerDisplay"></div>
            <button id="clearPlannerBtn" style="width:100%; margin-top:20px; padding:10px;">Plan leeren</button>
        </div>
    </div>

    <div id="recipeOverlay" class="overlay hidden">
        <div class="sheet" style="padding:0;">
            <img id="detailImage" style="width:100%; height:200px; object-fit:cover;">
            <div style="padding:20px;">
                <div style="display:flex; justify-content:space-between; align-items:start;">
                    <h2 id="detailTitle" style="margin:0;"></h2>
                    <button onclick="closeAll()" style="font-size:24px; border:none; background:none;">✕</button>
                </div>
                <div style="margin-top:15px; background:#f0f0f0; padding:10px; border-radius:10px;">
                    <strong>Planen für:</strong>
                    <select id="daySelector"><option value="Mo">Mo</option><option value="Di">Di</option><option value="Mi">Mi</option><option value="Do">Do</option><option value="Fr">Fr</option><option value="Sa">Sa</option><option value="So">So</option></select>
                    <button id="addToPlannerBtn">OK</button>
                </div>
                <div id="detailContent"></div>
                <button id="deleteBtn" style="color:red; margin-top:20px; border:none; background:none;">🗑️ Rezept löschen</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
